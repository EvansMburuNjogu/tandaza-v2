services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: tandaza
      MINIO_ROOT_PASSWORD: tandaza-secret
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 tandaza tandaza-secret; do sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/tandaza-media;
      /usr/bin/mc anonymous set download local/tandaza-media;
      "

volumes:
  minio-data:
