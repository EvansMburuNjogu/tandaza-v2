services:
  postgres:
    image: postgres:16
    container_name: tandaza-prod-postgres
    restart: unless-stopped
    env_file:
      - /opt/tandaza-production/env/postgres.env
    volumes:
      - tandaza-prod-postgres-data:/var/lib/postgresql/data
    networks:
      - tandaza-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tandaza -d tandaza"]
      interval: 15s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: tandaza-prod-minio
    command: ["server", "/data", "--console-address", ":9001"]
    restart: unless-stopped
    env_file:
      - /opt/tandaza-production/env/minio.env
    volumes:
      - tandaza-prod-minio-data:/data
    ports:
      - "127.0.0.1:9010:9000"
      - "127.0.0.1:9011:9001"
    networks:
      - tandaza-prod
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  minio-init:
    image: minio/mc:latest
    container_name: tandaza-prod-minio-init
    restart: "no"
    env_file:
      - /opt/tandaza-production/env/minio.env
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - tandaza-prod
    entrypoint: >
      /bin/sh -c "
      mc alias set tandaza http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing tandaza/tandaza-media &&
      mc anonymous set download tandaza/tandaza-media
      "

  backend:
    build:
      context: ./backend
    container_name: tandaza-prod-backend
    restart: unless-stopped
    env_file:
      - /opt/tandaza-production/env/backend.env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "127.0.0.1:8095:8080"
    networks:
      - tandaza-prod
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    container_name: tandaza-prod-frontend
    restart: unless-stopped
    env_file:
      - /opt/tandaza-production/env/frontend.env
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3210:3000"
    networks:
      - tandaza-prod
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 45s

networks:
  tandaza-prod:
    name: tandaza-prod

volumes:
  tandaza-prod-postgres-data:
  tandaza-prod-minio-data:
